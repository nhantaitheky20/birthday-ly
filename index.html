<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Sinh Nhật Bạn Iu</title>
    <style>
        :root {
            --item-size: 85px;
            --item-margin: -42.5px;
            --title-size: 2.5rem;
            --subtitle-size: 1.1rem;
        }

        @media (max-width: 768px) {
            :root {
                --item-size: 55px;
                --item-margin: -27.5px;
                --title-size: 1.8rem;
                --subtitle-size: 0.9rem;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            background-size: cover;
            background-position: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            perspective: 1200px; 
            touch-action: none; 
            user-select: none;
        }

        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #ffafbd, #ffc3a0);
            z-index: 2000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 1s ease; padding: 20px;
        }
        .loader-content {
            text-align: center; color: #fff;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.8);
            animation: pulseText 2s infinite;
        }
        .loader-content h2 { font-size: var(--title-size); margin-bottom: 20px; }
        
        @keyframes pulseText {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .heart-blink {
            position: absolute; color: #ff69b4; font-size: 15px;
            pointer-events: none; animation: blinkHeart 3s infinite ease-in-out; z-index: 5;
        }
        @keyframes blinkHeart {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2) rotate(10deg); }
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: -1;
        }

        .header {
            position: absolute; top: 30px; width: 100%;
            text-align: center; z-index: 10; pointer-events: none; 
            text-shadow: 0 0 10px black, 0 0 20px #ff69b4; padding: 0 15px;
        }
        .header h1 { font-size: var(--title-size); color: #ffebf3; }
        .header p { font-size: var(--subtitle-size); color: #ffe4e1; margin-top: 5px; }

        .scene {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center; cursor: grab; 
        }
        .scene:active { cursor: grabbing; } 

        .cake-container {
            position: relative; width: 0; height: 0;
            transform-style: preserve-3d; transition: transform 0.1s ease-out;
        }

        .cake-plate {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #fff0f5 30%, #ffb6c1 80%, #ff69b4 100%);
            border: 6px dotted #fff; 
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.8), inset 0 0 30px rgba(255, 20, 147, 0.6);
            opacity: 0.98;
        }

        .candle-group {
            position: absolute; width: 0; height: 0;
            transform-style: preserve-3d;
        }
        
        .candle-number {
            position: absolute; 
            bottom: 0; 
            left: -30px;
            width: 60px; 
            text-align: center;
            font-size: 55px; 
            font-weight: 900;
            font-family: 'Arial Black', Impact, sans-serif;
            color: #ff1493; 
            -webkit-text-stroke: 2px #fff; 
            filter: drop-shadow(0px 0px 10px rgba(255, 20, 147, 0.8));
        }

        .flame {
            position: absolute; 
            width: 12px; height: 24px;
            background: #ff9d00;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ff9d00, 0 0 40px #ff0000, inset 0 0 10px #fff;
            animation: flicker 0.15s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-2deg); opacity: 0.9; }
            100% { transform: scale(1.1) rotate(2deg); opacity: 1; box-shadow: 0 0 30px #ff9d00, 0 0 50px #ff0000; }
        }

        .video-item {
            position: absolute;
            width: var(--item-size); height: var(--item-size);
            margin: var(--item-margin) 0 0 var(--item-margin); 
            border-radius: 50%; cursor: pointer; background-color: #222;
            background-size: cover; background-position: center;
            border: 3px solid #ff69b4;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.8);
            transition: all 0.3s ease; padding: 5px; 
        }

        .video-item:hover {
            border-color: #fff; box-shadow: 0 0 30px #fff; transform: scale(1.4) !important;
        }

        /* POPUP VIDEO */
        .video-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .video-modal.active { opacity: 1; pointer-events: auto; }
        
        /* TỐI ƯU NÚT QUAY LẠI: Nhỏ gọn hơn */
        .back-btn {
            margin-bottom: 12px;
            padding: 8px 24px; 
            font-size: 0.9rem; 
            font-weight: bold; color: white;
            background: #ff69b4; border: none; border-radius: 50px; cursor: pointer; 
            transition: all 0.3s ease; text-transform: uppercase;
        }
        .back-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px #ff69b4; }

        /* TỐI ƯU VIDEO: Định dạng dọc 9:16 */
        #mainVideo {
            height: 75vh; /* Ưu tiên lấy chiều cao làm chuẩn để không bị tràn màn hình */
            max-width: 90vw; 
            aspect-ratio: 9 / 16; /* Ép khung hình dọc */
            border-radius: 15px; 
            box-shadow: 0 0 30px #ff69b4; 
            background: #000; 
            outline: none;
            object-fit: contain; /* Đảm bảo video hiển thị trọn vẹn không bị cắt xén */
        }
        
        @media (max-width: 768px) {
            #mainVideo {
                width: 90vw;
                height: auto;
                max-height: 75vh;
            }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <h2>Chúc mừng sinh nhật bạn iu nhé! 🎂</h2>
            <p>Đang thắp nến 19 tuổi và chuẩn bị bánh kem... ❤️</p>
        </div>
    </div>
    
    <div class="overlay"></div>

    <div class="header">
        <h1>Chúc mừng sinh nhật bạn iu ❤️</h1>
        <p>Xoay chiếc bánh và chạm vào từng mảnh kí ức</p>
    </div>

    <div class="scene" id="scene">
        <div class="cake-container" id="cakeContainer"></div>
    </div>

    <div class="video-modal" id="videoModal">
        <button class="back-btn" id="backBtn">❮ Quay lại</button>
        <video id="mainVideo" controls playsinline></video>
    </div>

    <script>
        const CAU_HINH = {
            anhNen: "https://res.cloudinary.com/dq629mmbe/image/upload/v1782458391/thumbnail_1_wgkkfe.jpg", 
            danhSachVideo: [
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458391/video_ki_niem_2_vw9bgu.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458443/video_ki_niem_20_jfnwq2.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458454/video_ki_niem_22_pbywft.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458457/video_ki_niem_23_up0gtp.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458475/video_ki_niem_29_jczubm.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458479/video_ki_niem_26_gw6oep.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458483/video_ki_niem_31_gri1qu.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458486/video_ki_niem_30_mrn3o6.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458489/video_ki_niem_3_nvysrj.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458510/video_ki_niem_4_nt4tnu.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458513/video_ki_niem_14_ay4xed.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458527/video_ki_niem_25_bfqunz.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458531/video_ki_niem_15_b6tmn3.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458544/video_ki_niem_5_ivvcxb.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458550/video_ki_niem_28_i1y5eo.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458550/video_ki_niem_11_rghgyy.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458550/video_ki_niem_9_z4wgof.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458565/video_ki_niem_6_v2vw5z.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458585/video_ki_niem_12_lpgu4w.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458596/video_ki_niem_27_khbsig.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458424/video_ki_niem_7_fkl8wm.mp4"
            ]
        };

        function createBlinkHearts() {
            const heartCount = window.innerWidth < 768 ? 20 : 40; 
            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-blink';
                heart.innerHTML = '❤';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = Math.random() * 100 + 'vh';
                heart.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(heart);
            }
        }
        createBlinkHearts();

        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);
            }, 2500); 
        });

        const optimizedBg = CAU_HINH.anhNen.replace('/upload/', '/upload/q_auto,f_auto/');
        document.body.style.backgroundImage = `url('${optimizedBg}')`;

        const cakeContainer = document.getElementById('cakeContainer');
        const videoModal = document.getElementById('videoModal');
        const mainVideo = document.getElementById('mainVideo');
        const backBtn = document.getElementById('backBtn');

        const totalVideos = CAU_HINH.danhSachVideo.length; 
        const isMobile = window.innerWidth < 768;
        const itemSize = isMobile ? 55 : 85; 
        
        const radiusBottom = isMobile ? 140 : 250; 
        const radiusTop = isMobile ? 80 : 140;     
        const heightBottom = isMobile ? 35 : 55;   
        const heightTop = isMobile ? -35 : -55;    

        const bottomCount = Math.ceil(totalVideos * 0.65);
        const topCount = totalVideos - bottomCount;

        const createPlate = (radius, posY) => {
            const plate = document.createElement('div');
            plate.className = 'cake-plate';
            const adjustedRadius = radius - (isMobile ? 15 : 25); 
            plate.style.width = `${adjustedRadius * 2}px`;
            plate.style.height = `${adjustedRadius * 2}px`;
            plate.style.transform = `translate(-50%, -50%) translateY(${posY}px) rotateX(90deg)`;
            cakeContainer.appendChild(plate);
        };

        createPlate(radiusBottom, heightBottom + itemSize/2 - 2);
        createPlate(radiusBottom, heightBottom - itemSize/2 + 2);
        createPlate(radiusTop, heightTop - itemSize/2 + 2);

        const candleObj = document.createElement('div');
        candleObj.className = 'candle-group';
        candleObj.style.transform = `translate(0, 0) translateY(${heightTop - itemSize/2}px)`; 
        
        candleObj.innerHTML = `
            <div class="candle-number">19</div>
            <div class="flame" style="left: -15px; bottom: 52px;"></div>
            <div class="flame" style="left: 12px; bottom: 52px;"></div>
            
            <div class="candle-number" style="transform: rotateY(90deg);">19</div>
            <div class="flame" style="left: -15px; bottom: 52px; transform: rotateY(90deg);"></div>
            <div class="flame" style="left: 12px; bottom: 52px; transform: rotateY(90deg);"></div>
        `;
        cakeContainer.appendChild(candleObj);

        for (let i = 0; i < totalVideos; i++) {
            const item = document.createElement('div');
            item.className = 'video-item';
            
            const thumbnailUrl = CAU_HINH.danhSachVideo[i]
                .replace('/upload/', '/upload/w_200,h_200,c_fill,q_auto,f_auto/')
                .replace('.mp4', '.jpg');
                
            item.style.backgroundImage = `url('${thumbnailUrl}')`;

            let angle, radiusZ, posY;
            if (i < bottomCount) {
                angle = (i / bottomCount) * 360;
                radiusZ = radiusBottom;
                posY = heightBottom;
            } else {
                const topIndex = i - bottomCount;
                angle = (topIndex / topCount) * 360;
                radiusZ = radiusTop;
                posY = heightTop;
            }

            const baseTransform = `rotateY(${angle}deg) translateZ(${radiusZ}px) translateY(${posY}px)`;
            item.style.transform = baseTransform;

            item.onmouseenter = () => item.style.transform = `${baseTransform} scale(1.3)`;
            item.onmouseleave = () => item.style.transform = baseTransform;

            item.addEventListener('click', (e) => {
                if (isDraggingBlockClick) return;
                mainVideo.src = CAU_HINH.danhSachVideo[i];
                videoModal.classList.add('active');
                mainVideo.play();
            });

            cakeContainer.appendChild(item);
        }

        let isDragging = false, isDraggingBlockClick = false;
        let startX, startY;
        let currentRotationX = -15; 
        let currentRotationY = 0;
        cakeContainer.style.transform = `rotateX(${currentRotationX}deg) rotateY(${currentRotationY}deg)`;

        const startDrag = (e) => {
            isDragging = true;
            isDraggingBlockClick = false; 
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        };

        const onDrag = (e) => {
            if (!isDragging) return;
            const currentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const currentY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            const deltaX = currentX - startX, deltaY = currentY - startY;

            if (Math.abs(deltaX) > 15 || Math.abs(deltaY) > 15) isDraggingBlockClick = true;

            currentRotationY += deltaX * 0.4; 
            currentRotationX -= deltaY * 0.4; 
            
            if (currentRotationX > 60) currentRotationX = 60;
            if (currentRotationX < -60) currentRotationX = -60;

            cakeContainer.style.transform = `rotateX(${currentRotationX}deg) rotateY(${currentRotationY}deg)`;
            startX = currentX; startY = currentY;
        };

        const stopDrag = () => {
            isDragging = false;
            setTimeout(() => isDraggingBlockClick = false, 50);
        };

        const scene = document.getElementById('scene');
        scene.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', onDrag);
        window.addEventListener('mouseup', stopDrag);
        scene.addEventListener('touchstart', startDrag, {passive: false});
        window.addEventListener('touchmove', onDrag, {passive: false});
        window.addEventListener('touchend', stopDrag);

        backBtn.addEventListener('click', () => {
            mainVideo.pause();
            videoModal.classList.remove('active');
            setTimeout(() => mainVideo.src = '', 400); 
        });
    </script>
</body>
</html>
