<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật - Quả Cầu Kí Ức</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            perspective: 1200px; 
            /* Ngăn trình duyệt cuộn trang khi vuốt trên điện thoại */
            touch-action: none; 
            user-select: none;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: -1;
        }

        .header {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none; 
            text-shadow: 0 0 10px black, 0 0 20px rgba(255, 215, 0, 0.8);
        }
        .header h1 { font-size: 2.5rem; color: #ffd700; }
        .header p { font-size: 1.1rem; color: #e2e8f0; margin-top: 5px; }

        .scene {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            cursor: grab; /* Biểu tượng bàn tay khi di chuột vào */
        }
        .scene:active { cursor: grabbing; } /* Biểu tượng nắm tay khi đang kéo */

        .sphere {
            position: relative; width: 0; height: 0;
            transform-style: preserve-3d; 
            /* Xóa hiệu ứng tự động xoay, chỉ giữ transition để mượt mà hơn khi ngừng vuốt */
            transition: transform 0.1s ease-out;
        }

        .video-item {
            position: absolute;
            width: 80px; height: 80px;
            margin: -40px 0 0 -40px; 
            border-radius: 50%;
            cursor: pointer;
            background-color: #222;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s ease;
            overflow: hidden; 
        }

        .video-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none; 
        }

        .video-item:hover {
            border-color: #ffd700;
            box-shadow: 0 0 30px #ffd700;
            /* Phóng to khi rê chuột vào để dễ chọn */
            filter: brightness(1.2);
        }

        .video-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .video-modal.active { opacity: 1; pointer-events: auto; }

        #mainVideo {
            width: 90%; max-width: 900px; max-height: 75vh;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 191, 255, 0.4);
            background: #000; outline: none;
        }

        .back-btn {
            margin-top: 30px; padding: 12px 40px;
            font-size: 1.2rem; font-weight: bold; color: white;
            background: transparent; border: 2px solid #ffd700;
            border-radius: 50px; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px;
        }
        .back-btn:hover {
            background: #ffd700; color: black; box-shadow: 0 0 20px #ffd700;
        }
    </style>
</head>
<body>
    
    <div class="overlay"></div>

    <div class="header">
        <h1>Quả Cầu Kí Ức</h1>
        <p>Vuốt để xoay quả cầu - Chạm để xem kí ức ❤️</p>
    </div>

    <div class="scene" id="scene">
        <div class="sphere" id="sphere"></div>
    </div>

    <div class="video-modal" id="videoModal">
        <video id="mainVideo" controls></video>
        <button class="back-btn" id="backBtn">❮ Quay lại</button>
    </div>

    <script>
        // ==========================================
        // KHU VỰC CÀI ĐẶT
        // ==========================================
        const CAU_HINH = {
            anhNen: "https://res.cloudinary.com/dq629mmbe/image/upload/v1782458391/thumbnail_1_wgkkfe.jpg", 

            danhSachVideo: [
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458391/video_ki_niem_2_vw9bgu.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458421/video_ki_niem_18_hvk5ba.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458424/video_ki_niem_7_fkl8wm.mp4"
            ]
        };
        // ==========================================

        document.body.style.backgroundImage = `url('${CAU_HINH.anhNen}')`;

        const scene = document.getElementById('scene');
        const sphere = document.getElementById('sphere');
        const videoModal = document.getElementById('videoModal');
        const mainVideo = document.getElementById('mainVideo');
        const backBtn = document.getElementById('backBtn');

        const totalVideos = CAU_HINH.danhSachVideo.length; 
        const radius = 260; 

        // TẠO QUẢ CẦU 3D
        for (let i = 0; i < totalVideos; i++) {
            const item = document.createElement('div');
            item.className = 'video-item';
            
            const thumbVideo = document.createElement('video');
            thumbVideo.src = CAU_HINH.danhSachVideo[i] + '#t=0.1';
            thumbVideo.preload = 'metadata'; 
            thumbVideo.muted = true; 
            item.appendChild(thumbVideo);

            const phi = Math.acos(1 - 2 * (i + 0.5) / totalVideos);
            const theta = Math.PI * (1 + Math.sqrt(5)) * i;

            const rotateX = (phi - Math.PI / 2) * (180 / Math.PI);
            const rotateY = theta * (180 / Math.PI);

            const baseTransform = `rotateY(${rotateY}deg) rotateX(${rotateX}deg) translateZ(${radius}px)`;
            item.style.transform = baseTransform;

            // Xử lý hover để phóng to mảnh ghép
            item.onmouseenter = () => {
                item.style.transform = `${baseTransform} scale(1.4)`;
            };
            item.onmouseleave = () => {
                item.style.transform = baseTransform;
            };

            // Sự kiện click (sẽ kết hợp kiểm tra trạng thái vuốt ở dưới)
            item.addEventListener('click', (e) => {
                // Nếu người dùng đang vuốt xoay thì KHÔNG mở video
                if (isDraggingBlockClick) {
                    e.preventDefault();
                    return;
                }
                mainVideo.src = CAU_HINH.danhSachVideo[i];
                videoModal.classList.add('active');
                mainVideo.play();
            });

            sphere.appendChild(item);
        }

        // ==========================================
        // XỬ LÝ VUỐT/KÉO XOAY QUẢ CẦU (THỦ CÔNG)
        // ==========================================
        let isDragging = false;
        let isDraggingBlockClick = false; // Biến khóa click nếu là hành động vuốt
        let startX, startY;
        let currentRotationX = 0;
        let currentRotationY = 0;
        const sensitivity = 0.5; // Độ nhạy khi vuốt (có thể tăng giảm)

        const startDrag = (e) => {
            isDragging = true;
            isDraggingBlockClick = false; // Mặc định là click cho đến khi có di chuyển
            
            // Lấy tọa độ chuột hoặc ngón tay
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        };

        const onDrag = (e) => {
            if (!isDragging) return;
            
            const currentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const currentY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

            const deltaX = currentX - startX;
            const deltaY = currentY - startY;

            // Nếu kéo chuột/vuốt ngón tay đi xa hơn 5px thì đánh dấu là đang vuốt (khóa click)
            if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
                isDraggingBlockClick = true;
            }

            // Tính toán góc xoay (kéo ngang đổi Y, kéo dọc đổi X)
            currentRotationY += deltaX * sensitivity;
            currentRotationX -= deltaY * sensitivity;

            // Áp dụng góc xoay vào quả cầu
            sphere.style.transform = `rotateX(${currentRotationX}deg) rotateY(${currentRotationY}deg)`;

            startX = currentX;
            startY = currentY;
        };

        const stopDrag = () => {
            isDragging = false;
            // Xóa khóa click sau 1 khoảng trễ nhỏ để tránh lỗi nhận diện
            setTimeout(() => { isDraggingBlockClick = false; }, 50);
        };

        // Gắn sự kiện cho Chuột (Máy tính)
        scene.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', onDrag);
        window.addEventListener('mouseup', stopDrag);

        // Gắn sự kiện cho Cảm ứng (Điện thoại)
        scene.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('touchmove', onDrag, { passive: false });
        window.addEventListener('touchend', stopDrag);


        // ==========================================
        // XỬ LÝ NÚT QUAY LẠI
        // ==========================================
        backBtn.addEventListener('click', () => {
            mainVideo.pause();
            videoModal.classList.remove('active');
            setTimeout(() => { mainVideo.src = ''; }, 400); 
        });

    </script>
</body>
</html>
