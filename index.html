<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật - Quả Cầu Kí Ức</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            perspective: 1200px; 
        }

        /* Lớp phủ mờ màu đen để làm nổi bật quả cầu và chữ */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: -1;
        }

        .header {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none; 
            text-shadow: 0 0 10px black, 0 0 20px rgba(255, 215, 0, 0.8);
        }
        .header h1 { font-size: 2.5rem; color: #ffd700; }
        .header p { font-size: 1.1rem; color: #e2e8f0; margin-top: 5px; }

        .scene {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .sphere {
            position: relative; width: 0; height: 0;
            transform-style: preserve-3d; 
            animation: rotateSphere 30s infinite linear; 
        }
        .sphere:hover { animation-play-state: paused; }

        @keyframes rotateSphere {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(180deg); }
        }

        /* Các mảnh ghép trên quả cầu bây giờ chứa video */
        .video-item {
            position: absolute;
            width: 80px; height: 80px;
            margin: -40px 0 0 -40px; 
            border-radius: 50%;
            cursor: pointer;
            background-color: #222;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            overflow: hidden; /* Cắt video thành hình tròn */
        }

        /* Tùy chỉnh video nhỏ hiển thị trên quả cầu */
        .video-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none; /* Tránh xung đột click */
        }

        .video-item:hover {
            transform: scale(1.6) !important; 
            z-index: 20;
            border-color: #ffd700;
            box-shadow: 0 0 30px #ffd700;
        }

        /* Popup phát video chính */
        .video-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .video-modal.active { opacity: 1; pointer-events: auto; }

        #mainVideo {
            width: 90%; max-width: 900px; max-height: 75vh;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 191, 255, 0.4);
            background: #000; outline: none;
        }

        .back-btn {
            margin-top: 30px; padding: 12px 40px;
            font-size: 1.2rem; font-weight: bold; color: white;
            background: transparent; border: 2px solid #ffd700;
            border-radius: 50px; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px;
        }
        .back-btn:hover {
            background: #ffd700; color: black; box-shadow: 0 0 20px #ffd700;
        }
    </style>
</head>
<body>
    
    <div class="overlay"></div>

    <div class="header">
        <h1>Quả Cầu Kí Ức</h1>
        <p>Những mảnh ghép lơ lửng - Chạm để xem và quay lại ❤️</p>
    </div>

    <div class="scene">
        <div class="sphere" id="sphere"></div>
    </div>

    <div class="video-modal" id="videoModal">
        <video id="mainVideo" controls></video>
        <button class="back-btn" id="backBtn">❮ Quay lại</button>
    </div>

    <script>
        // ==========================================
        // KHU VỰC CÀI ĐẶT DUY NHẤT BẠN CẦN CHỈNH SỬA
        // ==========================================
        const CAU_HINH = {
            // 1. Dán link ảnh nền từ Cloudinary vào đây
            anhNen: "LINK_ANH_NEN_CUA_BAN", 

            // 2. Dán các link video từ Cloudinary vào đây (đặt trong dấu ngoặc kép, cách nhau bởi dấu phẩy)
            danhSachVideo: [
                "LINK_VIDEO_1",
                "LINK_VIDEO_2",
                "LINK_VIDEO_3"
                // Bạn có thể tiếp tục phẩy (,) và xuống dòng thêm link cho đủ 31 video nhé!
            ]
        };
        // ==========================================


        // Cài đặt ảnh nền
        document.body.style.backgroundImage = `url('${CAU_HINH.anhNen}')`;

        const sphere = document.getElementById('sphere');
        const videoModal = document.getElementById('videoModal');
        const mainVideo = document.getElementById('mainVideo');
        const backBtn = document.getElementById('backBtn');

        const totalVideos = CAU_HINH.danhSachVideo.length; 
        const radius = 260; 

        for (let i = 0; i < totalVideos; i++) {
            const item = document.createElement('div');
            item.className = 'video-item';
            
            // Lấy trực tiếp video hiển thị làm thumbnail trên quả cầu 
            // Thêm #t=0.1 để ép trình duyệt tải khung hình đầu tiên của video thay vì màn hình đen
            const thumbVideo = document.createElement('video');
            thumbVideo.src = CAU_HINH.danhSachVideo[i] + '#t=0.1';
            thumbVideo.preload = 'metadata'; // Chỉ tải thông tin cơ bản để web không bị giật lag
            thumbVideo.muted = true; // Bắt buộc tắt tiếng để không bị phát tiếng chồng chéo
            item.appendChild(thumbVideo);

            // Tính toán 3D Fibonacci
            const phi = Math.acos(1 - 2 * (i + 0.5) / totalVideos);
            const theta = Math.PI * (1 + Math.sqrt(5)) * i;

            const rotateX = (phi - Math.PI / 2) * (180 / Math.PI);
            const rotateY = theta * (180 / Math.PI);

            const baseTransform = `rotateY(${rotateY}deg) rotateX(${rotateX}deg) translateZ(${radius}px)`;
            item.style.transform = baseTransform;

            item.onmouseenter = () => {
                item.style.transform = `${baseTransform} scale(1.6)`;
            };
            item.onmouseleave = () => {
                item.style.transform = baseTransform;
            };

            // Sự kiện click để mở video lớn
            item.addEventListener('click', () => {
                mainVideo.src = CAU_HINH.danhSachVideo[i];
                videoModal.classList.add('active');
                mainVideo.play();
            });

            sphere.appendChild(item);
        }

        backBtn.addEventListener('click', () => {
            mainVideo.pause();
            videoModal.classList.remove('active');
            setTimeout(() => { mainVideo.src = ''; }, 400); 
        });

    </script>
</body>
</html>
