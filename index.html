<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Mừng Sinh Nhật Bạn Iu</title>
    <style>
        /* BIẾN CSS ĐỂ TỰ ĐỘNG ĐỔI SIZE THEO MÀN HÌNH */
        :root {
            --item-size: 85px;
            --item-margin: -42.5px;
            --title-size: 2.5rem;
            --subtitle-size: 1.1rem;
        }

        /* Khi màn hình nhỏ hơn 768px (Điện thoại), tự động thu nhỏ các thông số */
        @media (max-width: 768px) {
            :root {
                --item-size: 55px;
                --item-margin: -27.5px;
                --title-size: 1.8rem;
                --subtitle-size: 0.9rem;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            background-size: cover;
            background-position: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            perspective: 1200px; 
            touch-action: none; /* Tránh vuốt bị cuộn trang trên iPhone */
            user-select: none;
        }

        /* MÀN HÌNH LOADING */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #ffafbd, #ffc3a0);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
            padding: 20px;
        }
        .loader-content {
            text-align: center;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.8);
            animation: pulseText 2s infinite;
        }
        .loader-content h2 { font-size: var(--title-size); margin-bottom: 20px; }
        @keyframes pulseText {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* HIỆU ỨNG TRÁI TIM BLINK */
        .heart-blink {
            position: absolute;
            color: #ff69b4;
            font-size: 15px;
            pointer-events: none;
            animation: blinkHeart 3s infinite ease-in-out;
            z-index: 5;
        }
        @keyframes blinkHeart {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2) rotate(10deg); }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: -1;
        }

        .header {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none; 
            text-shadow: 0 0 10px black, 0 0 20px #ff69b4;
            padding: 0 15px;
        }
        .header h1 { font-size: var(--title-size); color: #ffebf3; }
        .header p { font-size: var(--subtitle-size); color: #ffe4e1; margin-top: 5px; }

        .scene {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            cursor: grab; 
        }
        .scene:active { cursor: grabbing; } 

        .sphere {
            position: relative; width: 0; height: 0;
            transform-style: preserve-3d; 
            transition: transform 0.1s ease-out;
        }

        .video-item {
            position: absolute;
            /* Lấy kích thước từ biến CSS để thay đổi linh hoạt */
            width: var(--item-size); 
            height: var(--item-size);
            margin: var(--item-margin) 0 0 var(--item-margin); 
            border-radius: 50%;
            cursor: pointer;
            background-color: #222;
            background-size: cover;
            background-position: center;
            border: 2px solid #ff69b4;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
            transition: all 0.3s ease;
        }

        .video-item:hover {
            border-color: #fff;
            box-shadow: 0 0 30px #ff69b4;
            transform: scale(1.5) !important;
        }

        .video-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .video-modal.active { opacity: 1; pointer-events: auto; }

        #mainVideo {
            width: 90%; max-width: 900px; max-height: 75vh;
            border-radius: 20px;
            box-shadow: 0 0 50px #ff69b4;
            background: #000; outline: none;
        }

        .back-btn {
            margin-top: 30px; padding: 12px 40px;
            font-size: 1.1rem; font-weight: bold; color: white;
            background: #ff69b4; border: none;
            border-radius: 50px; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase;
        }
        .back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #ff69b4;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <h2>Chúc mừng sinh nhật bạn iu nhé! 🎂</h2>
            <p>Đang chuẩn bị những kí ức ngọt ngào nhất... ❤️</p>
        </div>
    </div>
    
    <div class="overlay"></div>

    <div class="header">
        <h1>Chúc mừng sinh nhật bạn iu nhé ❤️</h1>

    </div>

    <div class="scene" id="scene">
        <div class="sphere" id="sphere"></div>
    </div>

    <div class="video-modal" id="videoModal">
        <video id="mainVideo" controls playsinline></video>
        <button class="back-btn" id="backBtn">❮ Quay lại</button>
    </div>
