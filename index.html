<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật Bạn Iu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            background-size: cover;
            background-position: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            perspective: 1200px; 
            touch-action: none; 
            user-select: none;
        }

        /* MÀN HÌNH LOADING */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #ffafbd, #ffc3a0);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }
        .loader-content {
            text-align: center;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.8);
            animation: pulseText 2s infinite;
        }
        .loader-content h2 { font-size: 2.5rem; margin-bottom: 20px; }
        @keyframes pulseText {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* HIỆU ỨNG TRÁI TIM BLINK */
        .heart-blink {
            position: absolute;
            color: #ff69b4;
            font-size: 15px;
            pointer-events: none;
            animation: blinkHeart 3s infinite ease-in-out;
            z-index: 5;
        }
        @keyframes blinkHeart {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2) rotate(10deg); }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: -1;
        }

        .header {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none; 
            text-shadow: 0 0 10px black, 0 0 20px #ff69b4;
        }
        .header h1 { font-size: 2.5rem; color: #ffebf3; }
        .header p { font-size: 1.1rem; color: #ffe4e1; margin-top: 5px; }

        .scene {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            cursor: grab; 
        }
        .scene:active { cursor: grabbing; } 

        .sphere {
            position: relative; width: 0; height: 0;
            transform-style: preserve-3d; 
            transition: transform 0.1s ease-out;
        }

        .video-item {
            position: absolute;
            width: 85px; height: 85px;
            margin: -42.5px 0 0 -42.5px; 
            border-radius: 50%;
            cursor: pointer;
            background-color: #222;
            background-size: cover;
            background-position: center;
            border: 2px solid #ff69b4;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
            transition: all 0.3s ease;
        }

        .video-item:hover {
            border-color: #fff;
            box-shadow: 0 0 30px #ff69b4;
            transform: scale(1.5) !important;
        }

        .video-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .video-modal.active { opacity: 1; pointer-events: auto; }

        #mainVideo {
            width: 90%; max-width: 900px; max-height: 75vh;
            border-radius: 20px;
            box-shadow: 0 0 50px #ff69b4;
            background: #000; outline: none;
        }

        .back-btn {
            margin-top: 30px; padding: 12px 40px;
            font-size: 1.2rem; font-weight: bold; color: white;
            background: #ff69b4; border: none;
            border-radius: 50px; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase;
        }
        .back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #ff69b4;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <h2>Chúc mừng sinh nhật bạn iu nhé! 🎂</h2>
            <p>Đang chuẩn bị những kí ức ngọt ngào nhất... ❤️</p>
        </div>
    </div>
    
    <div class="overlay"></div>

    <div class="header">
        <h1>Chúc mừng sinh nhật bạn iu nhé ❤️</h1>
        <p>Xoay quả cầu và chạm vào từng mảnh kí ức nhé</p>
    </div>

    <div class="scene" id="scene">
        <div class="sphere" id="sphere"></div>
    </div>

    <div class="video-modal" id="videoModal">
        <video id="mainVideo" controls playsinline></video>
        <button class="back-btn" id="backBtn">❮ Quay lại</button>
    </div>

    <script>
        const CAU_HINH = {
            anhNen: "https://res.cloudinary.com/dq629mmbe/image/upload/v1782458391/thumbnail_1_wgkkfe.jpg", 

            danhSachVideo: [
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458391/video_ki_niem_2_vw9bgu.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458421/video_ki_niem_18_hvk5ba.mp4",
                "https://res.cloudinary.com/dq629mmbe/video/upload/v1782458424/video_ki_niem_7_fkl8wm.mp4"
                // Thêm các link video khác của bạn vào đây
            ]
        };

        // HIỆU ỨNG TRÁI TIM BLINK KHẮP MÀN HÌNH
        function createBlinkHearts() {
            for (let i = 0; i < 40; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-blink';
                heart.innerHTML = '❤';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = Math.random() * 100 + 'vh';
                heart.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(heart);
            }
        }
        createBlinkHearts();

        // XỬ LÝ LOADER
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);
            }, 2500); // Hiển thị lời chúc trong 2.5 giây
        });

        document.body.style.backgroundImage = `url('${CAU_HINH.anhNen}')`;

        const sphere = document.getElementById('sphere');
        const videoModal = document.getElementById('videoModal');
        const mainVideo = document.getElementById('mainVideo');
        const backBtn = document.getElementById('backBtn');

        const totalVideos = CAU_HINH.danhSachVideo.length; 
        const radius = 260; 

        for (let i = 0; i < totalVideos; i++) {
            const item = document.createElement('div');
            item.className = 'video-item';
            
            const thumbnailUrl = CAU_HINH.danhSachVideo[i].replace('.mp4', '.jpg');
            item.style.backgroundImage = `url('${thumbnailUrl}')`;

            const phi = Math.acos(1 - 2 * (i + 0.5) / totalVideos);
            const theta = Math.PI * (1 + Math.sqrt(5)) * i;

            const rotateX = (phi - Math.PI / 2) * (180 / Math.PI);
            const rotateY = theta * (180 / Math.PI);

            const baseTransform = `rotateY(${rotateY}deg) rotateX(${rotateX}deg) translateZ(${radius}px)`;
            item.style.transform = baseTransform;

            item.onmouseenter = () => item.style.transform = `${baseTransform} scale(1.4)`;
            item.onmouseleave = () => item.style.transform = baseTransform;

            item.addEventListener('click', (e) => {
                if (isDraggingBlockClick) return;
                mainVideo.src = CAU_HINH.danhSachVideo[i];
                videoModal.classList.add('active');
                mainVideo.play();
            });

            sphere.appendChild(item);
        }

        // XOAY QUẢ CẦU
        let isDragging = false, isDraggingBlockClick = false;
        let startX, startY, currentRotationX = 0, currentRotationY = 0;

        const startDrag = (e) => {
            isDragging = true;
            isDraggingBlockClick = false; 
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        };

        const onDrag = (e) => {
            if (!isDragging) return;
            const currentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const currentY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            const deltaX = currentX - startX, deltaY = currentY - startY;

            if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) isDraggingBlockClick = true;

            currentRotationY += deltaX * 0.5;
            currentRotationX -= deltaY * 0.5;
            sphere.style.transform = `rotateX(${currentRotationX}deg) rotateY(${currentRotationY}deg)`;
            startX = currentX; startY = currentY;
        };

        const stopDrag = () => {
            isDragging = false;
            setTimeout(() => isDraggingBlockClick = false, 50);
        };

        const scene = document.getElementById('scene');
        scene.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', onDrag);
        window.addEventListener('mouseup', stopDrag);
        scene.addEventListener('touchstart', startDrag);
        window.addEventListener('touchmove', onDrag);
        window.addEventListener('touchend', stopDrag);

        backBtn.addEventListener('click', () => {
            mainVideo.pause();
            videoModal.classList.remove('active');
            setTimeout(() => mainVideo.src = '', 400); 
        });
    </script>
</body>
</html>
